services:
  - type: keyvalue
    name: pulseboard-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  - type: web
    name: pulseboard-web
    runtime: docker
    dockerfilePath: ./apps/web/Dockerfile
    dockerContext: .
    plan: starter
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: pulseboard-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: pulseboard-redis
          type: keyvalue
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: DIRECT_URL
        fromDatabase:
          name: pulseboard-db
          property: connectionString
      - key: SESSION_COOKIE_NAME
        value: pulseboard.session
      - key: PUBLIC_DEFAULT_ORG_SLUG
        value: demo
      - key: OLLAMA_MODEL
        value: llama3.2:1b
      - key: RESEND_FROM
        value: PulseBoard <onboarding@resend.dev>

databases:
  - name: pulseboard-db
    databaseName: pulseboard
    user: pulseboard
