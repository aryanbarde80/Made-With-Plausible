services:
  - type: keyvalue
    name: pulseboard-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  - type: web
    name: pulseboard-web
    runtime: docker
    dockerfilePath: ./apps/web/Dockerfile
    dockerContext: .
    plan: starter
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: pulseboard-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: pulseboard-redis
          type: redis
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: DIRECT_URL
        fromDatabase:
          name: pulseboard-db
          property: connectionString
      - key: SESSION_COOKIE_NAME
        value: pulseboard.session
      - key: PUBLIC_DEFAULT_ORG_SLUG
        value: demo
      - key: OLLAMA_MODEL
        value: llama3
      - key: SMTP_FROM
        value: PulseBoard <hello@pulseboard.local>
      - key: ABLY_API_KEY
        sync: false
      - key: NEXT_PUBLIC_ABLY_KEY
        sync: false
      - key: PLAUSIBLE_BASE_URL
        sync: false
      - key: PLAUSIBLE_API_KEY
        sync: false
      - key: OLLAMA_BASE_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false

  - type: worker
    name: pulseboard-worker
    runtime: docker
    dockerfilePath: ./apps/worker/Dockerfile
    dockerContext: .
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pulseboard-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: pulseboard-redis
          type: keyvalue
          property: connectionString
      - key: DIRECT_URL
        fromDatabase:
          name: pulseboard-db
          property: connectionString
      - key: PLAUSIBLE_BASE_URL
        sync: false
      - key: PLAUSIBLE_API_KEY
        sync: false
      - key: OLLAMA_BASE_URL
        sync: false
      - key: OLLAMA_MODEL
        value: llama3

databases:
  - name: pulseboard-db
    databaseName: pulseboard
    user: pulseboard
