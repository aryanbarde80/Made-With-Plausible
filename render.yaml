services:
  - type: web
    name: pulseboard-web
    runtime: docker
    dockerfilePath: ./apps/web/Dockerfile
    plan: starter
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: pulseboard-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: pulseboard-redis
          type: redis
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        sync: false
      - key: ABLY_API_KEY
        sync: false
      - key: NEXT_PUBLIC_ABLY_KEY
        sync: false
      - key: PLAUSIBLE_BASE_URL
        sync: false
      - key: PLAUSIBLE_API_KEY
        sync: false
      - key: OLLAMA_BASE_URL
        sync: false
      - key: OLLAMA_MODEL
        value: llama3
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false

  - type: worker
    name: pulseboard-worker
    runtime: docker
    dockerfilePath: ./apps/worker/Dockerfile
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pulseboard-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: pulseboard-redis
          type: redis
          property: connectionString
      - key: PLAUSIBLE_BASE_URL
        sync: false
      - key: PLAUSIBLE_API_KEY
        sync: false
      - key: OLLAMA_BASE_URL
        sync: false
      - key: OLLAMA_MODEL
        value: llama3

databases:
  - name: pulseboard-db
    databaseName: pulseboard
    user: pulseboard

